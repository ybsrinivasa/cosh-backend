# Cosh 2.0 — Production compose for local server (cosh2.eywa.farm)
# Server: 10.12.10.115 (LAN) / 106.51.66.90:3860 (public via Cloudflare)
# Layout: /data/cosh2.0Pro/cosh-backend (this) + /data/cosh2.0Pro/cosh-frontend
#
# Networking note (2026-05-26): UFW on the prod host broke Docker bridge
# outbound (FORWARD policy DROP, DOCKER chains empty, packets fell through to
# UFW drop). `systemctl restart docker` did not fix it. As a durable workaround,
# api / celery / celery-beat now use `network_mode: host` so they share the
# host's working network namespace and can reach rstalkapi.eywa.farm, SMTP,
# Anthropic, etc. Postgres / Redis / Neo4j / Indictrans publish their ports to
# 127.0.0.1 so the host-networked services reach them via loopback. Frontend
# stays on the bridge with an `extra_hosts: api -> host-gateway` mapping so
# INTERNAL_API_URL=http://api:8000 keeps resolving.
# See feedback_dockerignore_required.md memory for full diagnostic story.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /data/cosh2.0Pro/db/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4J ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_bolt_advertised__address: ':7687'
    volumes:
      - /data/cosh2.0Pro/db/neo4j/data:/data
      - /data/cosh2.0Pro/db/neo4j/logs:/logs
      - /data/cosh2.0Pro/db/neo4j/plugins:/plugins
    ports:
      - "127.0.0.1:7687:7687"
      - "127.0.0.1:7474:7474"

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    env_file: .env
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── IndicTrans2 (background translation) ───────────────────────────────────
  indictrans:
    build:
      context: ./indictrans
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      # Persist HuggingFace model cache so we don't re-download on rebuild.
      - /data/cosh2.0Pro/models/huggingface:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 3

  # ── Celery worker ───────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    command: celery -A app.celery_app worker --loglevel=info -Q translation,similarity,sync --concurrency=2
    restart: unless-stopped
    env_file: .env
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery beat (scheduled tasks) ───────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    command: celery -A app.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file: .env
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: /data/cosh2.0Pro/cosh-frontend
      dockerfile: Dockerfile
      network: host
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL}
    ports:
      - "127.0.0.1:3001:3000"
    extra_hosts:
      # api runs in host network mode; resolve "api" to the docker bridge
      # gateway (host) so INTERNAL_API_URL=http://api:8000 keeps working.
      - "api:host-gateway"

networks:
  default:
    name: cosh2pro_network
