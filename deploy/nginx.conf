# Nginx config for cosh.dev.eywa.farm — Stage 1
# Place at: /etc/nginx/sites-available/cosh
# Enable with: ln -s /etc/nginx/sites-available/cosh /etc/nginx/sites-enabled/cosh
#
# Routing:
#   https://cosh.dev.eywa.farm/api/*  →  FastAPI :8000  (nginx strips /api prefix)
#   https://cosh.dev.eywa.farm/*      →  Next.js  :3000
#
# Run certbot AFTER the HTTP server block below is live and DNS is pointing here:
#   sudo certbot --nginx -d cosh.dev.eywa.farm

# ── HTTP: redirect all to HTTPS (except certbot challenge) ───────────────────
server {
    listen 80;
    server_name cosh.dev.eywa.farm;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name cosh.dev.eywa.farm;

    # Certbot populates these paths automatically
    ssl_certificate     /etc/letsencrypt/live/cosh.dev.eywa.farm/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cosh.dev.eywa.farm/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;   # Allow large CSV/image uploads

    # ── API: /api/* → FastAPI (strip the /api prefix) ──────────────────────
    location /api/ {
        proxy_pass         http://localhost:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Frontend: everything else → Next.js ────────────────────────────────
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
