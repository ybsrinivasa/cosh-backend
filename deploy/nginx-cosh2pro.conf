# Cosh 2.0 Production — nginx site config for local server
# Listens on port 3860 (the public port forwarded by the router from 106.51.66.90:3860)
# SSL is terminated upstream (Cloudflare). This config serves HTTP only on the origin.
#
# Place at: /etc/nginx/sites-available/cosh2pro
# Enable:   sudo ln -sf /etc/nginx/sites-available/cosh2pro /etc/nginx/sites-enabled/cosh2pro
#           sudo rm -f /etc/nginx/sites-enabled/default
#           sudo nginx -t && sudo systemctl reload nginx

server {
    listen 3860;
    server_name cosh2.eywa.farm 106.51.66.90 10.12.10.115;

    client_max_body_size 50M;

    # Real client IP from Cloudflare. Trust the X-Forwarded-For header.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ── API: /api/* → FastAPI (strips /api prefix) ──────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    # ── Health check passthrough ────────────────────────────────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:8000/health;
        access_log         off;
    }

    # ── Frontend: everything else → Next.js ─────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}
