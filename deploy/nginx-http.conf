# nginx-http.conf — HTTP only, for initial deployment before DNS and SSL are set up.
# Use this first. Once DNS points to the server, switch to nginx.conf + certbot.
#
# Place at: /etc/nginx/sites-available/cosh
# Enable:   sudo ln -sf /etc/nginx/sites-available/cosh /etc/nginx/sites-enabled/cosh
#           sudo rm -f /etc/nginx/sites-enabled/default
#           sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8080;
    server_name coshdev.eywa.farm 106.51.66.90;

    client_max_body_size 50M;

    # ── API: /api/* → FastAPI (strips /api prefix) ────────────────────────
    location /api/ {
        proxy_pass         http://localhost:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Frontend: everything else → Next.js ───────────────────────────────
    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
